<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>GemFire AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ── VMware Clarity light theme (default) ── */
        :root {
            --bg:            #f3f6fa;
            --panel-bg:      #ffffff;
            --sidebar-bg:    #e8f0f7;
            --border:        #dde3ea;
            --text-primary:  #21333b;
            --text-secondary:#5a7184;
            --text-muted:    #89a0b0;
            --vmw-blue:      #0079b8;
            --vmw-blue-dark: #004e8a;
            --msg-user-bg:   #0079b8;
            --msg-user-text: #ffffff;
            --msg-ai-bg:     #f0f5fa;
            --msg-ai-text:   #21333b;
            --input-bg:      #ffffff;
            --input-border:  #b8ccd8;
            --chip-bg:       #ddeaf3;
            --chip-hover:    #c5d9e8;
            --shadow:        0 2px 12px rgba(0,121,184,0.10);
        }
        /* ── Dark theme overrides ── */
        [data-theme="dark"] {
            --bg:            #0f1724;
            --panel-bg:      #0b1220;
            --sidebar-bg:    #0d1829;
            --border:        #1e2d3d;
            --text-primary:  #e6eef8;
            --text-secondary:#94a3b8;
            --text-muted:    #64748b;
            --vmw-blue:      #00b4e6;
            --vmw-blue-dark: #0091da;
            --msg-user-bg:   #163a5a;
            --msg-user-text: #e6eef8;
            --msg-ai-bg:     rgba(255,255,255,0.04);
            --msg-ai-text:   #e6eef8;
            --input-bg:      #0d1829;
            --input-border:  #1e3a52;
            --chip-bg:       rgba(255,255,255,0.06);
            --chip-hover:    rgba(255,255,255,0.10);
            --shadow:        0 2px 12px rgba(0,0,0,0.5);
        }
        html,body,#app{height:100%}
        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            transition: background 0.25s, color 0.25s;
        }
        /* VMware blue accent bar at top */
        body::before {
            content: '';
            display: block;
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--vmw-blue), var(--vmw-blue-dark));
            z-index: 100;
        }
        #app { padding-top: calc(1.5rem + 3px); }
        .glass {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: background 0.25s, border-color 0.25s;
        }
        .sidebar-panel {
            background: var(--sidebar-bg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .msg-user { background: var(--msg-user-bg); color: var(--msg-user-text); }
        .msg-assistant {
            background: var(--msg-ai-bg);
            color: var(--msg-ai-text);
            border: 1px solid var(--border);
        }
        .bubble { max-width: 78%; padding: 12px 14px; border-radius: 12px; }
        .rounded-left  { border-bottom-left-radius: 4px; }
        .rounded-right { border-bottom-right-radius: 4px; }
        .example-chip {
            cursor: pointer;
            background: var(--chip-bg);
            color: var(--text-primary);
            border: 1px solid var(--border);
            transition: background 0.15s;
        }
        .example-chip:hover { background: var(--chip-hover); }
        .compose {
            background: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--input-border);
            transition: border-color 0.15s;
        }
        .compose::placeholder { color: var(--text-muted); }
        .compose:focus { outline: none; border-color: var(--vmw-blue); box-shadow: 0 0 0 3px rgba(0,121,184,0.15); }
        .send-btn { background: var(--vmw-blue); color: #fff; transition: background 0.15s; }
        .send-btn:hover { background: var(--vmw-blue-dark); }
        .theme-btn {
            background: var(--chip-bg);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.15s;
        }
        .theme-btn:hover { background: var(--chip-hover); }
    </style>
</head>
<body>
<div id="app" class="min-h-screen flex items-stretch p-6">

    <aside class="w-80 mr-6 hidden md:flex flex-col sidebar-panel rounded-2xl p-4 overflow-y-auto">
        <div class="flex items-center gap-3 mb-4">
            <div class="h-10 w-10 rounded-xl flex items-center justify-center text-white font-bold" style="background:var(--vmw-blue)">AI</div>
            <div>
                <div class="font-semibold" style="color:var(--text-primary)">GemFire AI</div>
                <div style="font-size:0.85rem;color:var(--text-secondary)">Ask a question — instant replies</div>
            </div>
        </div>

        <div class="mt-3 text-sm font-medium" style="color:var(--text-secondary)">Examples</div>
        <div class="mt-2 flex flex-col gap-2" id="preLoadedQuestions">
            <button class="example-chip text-left p-3 rounded-lg">Explain quantum computing in simple terms</button>
            <button class="example-chip text-left p-3 rounded-lg">Write a short professional email for follow-up</button>
            <button class="example-chip text-left p-3 rounded-lg">Create a shopping list for a week of dinners</button>
        </div>

    </aside>

    <main class="flex-1 flex flex-col h-[80vh] max-h-[1000px]">
        <div class="glass rounded-2xl flex-1 p-4 flex flex-col">

            <header class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <div class="h-9 w-9 rounded-lg flex items-center justify-center font-semibold text-white" style="background:var(--vmw-blue)">AI</div>
                    <div>
                        <div class="font-semibold" style="color:var(--text-primary)">GemFire AI Assistant</div>
                        <div style="font-size:0.75rem;color:var(--text-secondary)">Powered by VMware GemFire Vector DB</div>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button id="clearBtn" class="text-white text-sm px-3 py-2 rounded-md font-semibold transition" style="background:#c92100" onmouseover="this.style.background='#a51900'" onmouseout="this.style.background='#c92100'">Clear</button>
                    <button id="addContextBtn" class="send-btn text-sm px-3 py-2 rounded-md font-semibold transition">Add Context</button>
                    <button id="themeToggle" class="theme-btn">Dark Mode</button>
                </div>
            </header>

            <section id="messages" class="flex-1 overflow-auto space-y-4 pb-4">
                <div class="flex">
                    <div class="bubble msg-assistant rounded-right rounded-xl">Hello — ask me anything. Try the examples in the left panel.</div>
                </div>
            </section>

            <form id="composer" class="mt-4">
                <div class="flex items-end gap-3">
                    <textarea id="input" rows="1" placeholder="Type your question here... (Shift+Enter for newline)" class="flex-1 resize-none rounded-xl p-3 compose" aria-label="Message input"></textarea>
                    <div class="flex items-center gap-2">
                        <button type="button" id="attach" class="p-2 rounded-md" title="Attach (demo)" style="color:var(--text-secondary)">📎</button>
                        <button id="sendBtn" type="submit" class="send-btn px-4 py-2 rounded-xl font-semibold shadow">Send</button>
                        <button type="button" onclick="clearAnswer()" id="clearAnswerButton" class="p-2 rounded-md" title="Clear Answer" style="color:var(--text-secondary)">🗑️</button>
                    </div>
                </div>
            </form>

        </div>

        <div class="mt-3 text-xs" style="color:var(--text-muted)">Tip: Press Enter to send, Shift+Enter for newline.</div>
    </main>
</div>

<div id="contextModal" class="fixed inset-0 backdrop-blur-sm flex items-center justify-center hidden z-50 p-4" style="background:rgba(15,23,36,0.80)">
    <div class="rounded-2xl w-full max-w-lg p-6 shadow-2xl" style="background:var(--panel-bg);border:1px solid var(--border)">
        <h2 class="text-xl font-semibold mb-4" style="color:var(--text-primary)">Add Vector Search Context</h2>
        <form id="contextForm" class="space-y-4">
            <div>
                <label for="modalPrompt" class="block text-sm font-medium mb-1" style="color:var(--text-secondary)">Prompt</label>
                <input type="text" id="modalPrompt" placeholder="e.g., Was Tanzu GemFire 10 dedicated to anyone?" class="w-full rounded-xl p-3 focus:outline-none" style="background:var(--input-bg);color:var(--text-primary);border:1px solid var(--input-border)">
            </div>
            <div>
                <label for="modalContext" class="block text-sm font-medium mb-1" style="color:var(--text-secondary)">Context URL / String</label>
                <input type="text" id="modalContext" required placeholder="e.g., https://blogs.vmware.com/..." class="w-full rounded-xl p-3 focus:outline-none" style="background:var(--input-bg);color:var(--text-primary);border:1px solid var(--input-border)">
            </div>
            <div class="flex justify-end gap-3 pt-2">
                <button type="button" id="closeModalBtn" class="px-4 py-2 rounded-xl font-medium transition" style="color:var(--text-secondary)">Cancel</button>
                <button type="submit" class="send-btn px-5 py-2 rounded-xl font-semibold shadow transition">Submit Context</button>
            </div>
        </form>
    </div>
</div>

<script>
    // Simple interaction script to mimic a chat app.
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const composer = document.getElementById('composer');
    const sendBtn = document.getElementById('sendBtn');
    const examples = document.querySelectorAll('.example-chip');
    const themeToggle = document.getElementById('themeToggle');
    const clearBtn = document.getElementById('clearBtn');

    // Modal DOM Elements
    const contextModal = document.getElementById('contextModal');
    const addContextBtn = document.getElementById('addContextBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const contextForm = document.getElementById('contextForm');

    // Clear Button Logic to call the requested endpoint configuration
    clearBtn.addEventListener('click', async () => {
        const url = 'cache/ops';

        try {
            const res = await fetch(url, {
                method: 'DELETE',
                headers: {
                    'accept': '*/*'
                },
                body: ''
            });

            if (res.ok) {
                alert('Clear operation completed successfully!');
            } else {
                alert(`Clear action failed with status: ${res.status}`);
            }
        } catch (error) {
            console.error('Error executing Clear action:', error);
            alert(`Failed to execute Clear action: ${error.message}`);
        }
    });

    // Modal Control logic
    addContextBtn.addEventListener('click', () => {

        //Copy current prompt to context
        document.getElementById('modalPrompt').value = document.getElementById("input").value;

        contextModal.classList.remove('hidden');
    });

    closeModalBtn.addEventListener('click', () => {
        contextModal.classList.add('hidden');
        contextForm.reset();
    });

    // Dynamic Modal submit handling POST parameters matching your curl configuration
    contextForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const promptVal = document.getElementById('modalPrompt').value.trim();
        const contextVal = document.getElementById('modalContext').value.trim();

        // Build URL dynamically ensuring valid Query Parameter String encoding
        const baseUrl = '/vector/search/prompt/context';
        const urlParams = new URLSearchParams({
            prompt: promptVal,
            context: contextVal
        });
        const requestUrl = `${baseUrl}?${urlParams.toString()}`;

        try {
            const res = await fetch(requestUrl, {
                method: 'POST',
                headers: {
                    'accept': '*/*'
                },
                body: '' // Empty body matching -d '' snippet
            });

            if (res.ok) {
                alert('Context added successfully!');
                contextModal.classList.add('hidden');
                contextForm.reset();
            } else {
                alert(`Server returned an error status: ${res.status}`);
            }
        } catch (error) {
            console.error('Error submitting context:', error);
            alert(`Failed to connect to backend context endpoint: ${error.message}`);
        }
    });

    // Auto grow textarea
    function autoGrow(el){
        el.style.height = 'auto';
        el.style.height = (el.scrollHeight) + 'px';
    }
    inputEl.addEventListener('input', e=>autoGrow(e.target));

    // Add message bubble
    function appendMessage({role='assistant', text}){
        const wrapper = document.createElement('div');
        wrapper.className = 'flex' + (role === 'user' ? ' justify-end' : '');
        const bubble = document.createElement('div');
        bubble.className = 'bubble ' + (role === 'user' ? 'msg-user rounded-left rounded-xl' : 'msg-assistant rounded-right rounded-xl');
        bubble.innerText = text;
        wrapper.appendChild(bubble);
        messagesEl.appendChild(wrapper);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // Typing indicator
    function showTyping(){
        const el = document.createElement('div');
        el.className = 'flex';
        el.id = 'typing';
        el.innerHTML = `<div class="bubble msg-assistant rounded-right rounded-xl"><span class="dots">Typing<span class="animate-pulse">...</span></span></div>`;
        messagesEl.appendChild(el);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showClearCache(userText){
        const el = document.createElement('div');
        el.className = 'flex';
        el.id = 'typing';
        el.innerHTML = `<div class="bubble msg-assistant rounded-right rounded-xl"><span class="dots">Clearing cached Answer for ${userText}}<span class="animate-pulse">...</span></span></div>`;
        messagesEl.appendChild(el);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function getAiResponse(userText){

        const apiUrl = 'vector/search';
        const startTime = performance.now();
        var data = "";
        try {
            const res = await fetch(apiUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: userText
            });

            data = await res.text();
            const endTime = performance.now();

            var totalTime = (endTime - startTime).toFixed(2);
            data = data + "\n\n Request took: "+  totalTime+ " ms";
            appendMessage({role:'assistant', text:data});

            // Remove Typing
            hideTyping();

        } catch (error) {
            hideTyping();
            appendMessage({role:'assistant', text:error});
        }
    }

    function hideTyping(){const t=document.getElementById('typing'); if(t) t.remove();}

    function askPreloadedQuestionFromButton(questionButton){
        var newQuestion = questionButton.innerText;
        inputEl.value = newQuestion;
        appendMessage({role:'user', text:newQuestion} );
        aiReply(newQuestion);
    }

    // Mock assistant response
    function aiReply(userText){
        showTyping();
        setTimeout(()=>{
            getAiResponse(userText);
        }, 800 + Math.min(userText.length*10, 1200));
    }

    composer.addEventListener('submit', e=>{
        e.preventDefault();
        const text = inputEl.value.trim();
        if(!text) return;
        appendMessage({role:'user', text});
        autoGrow(inputEl);
        aiReply(text);
    });

    // Enter to send (Shift+Enter new line)
    inputEl.addEventListener('keydown', e=>{
        if(e.key === 'Enter' && !e.shiftKey){
            e.preventDefault();
            sendBtn.click();
        }
    });

    // Example buttons
    examples.forEach(btn=>btn.addEventListener('click', ()=>{
        inputEl.value = btn.innerText;
        autoGrow(inputEl);
        inputEl.focus();
    }));

    // Theme toggle — Light Mode (default) / Dark Mode
    let dark = false;
    themeToggle.addEventListener('click', () => {
        dark = !dark;
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : '');
        themeToggle.textContent = dark ? 'Light Mode' : 'Dark Mode';
    });

    async function clearAnswer(){
        const userText = inputEl.value.trim();
        showClearCache(userText);
        const startTime = performance.now();

        const apiUrl = 'vector/search/prompt';
        try{
            await fetch(apiUrl, {
                method: 'DELETE',
                headers: {
                    'accept' : '*/*'
                },
                body: new URLSearchParams({
                    prompt: userText
                })
            });
            hideTyping();
        } catch (error) {
            const endTime = performance.now();
            hideTyping();
            console.error("Error standardizing cache update: ", error);
        }
    }

    // Accessibility: focus input on load
    window.addEventListener('load', async ()=> {
        inputEl.focus();
        const resultsDiv = document.getElementById('preLoadedQuestions');

        try {
            const response = await fetch('prompts');
            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.json();

            let questionButtons = '';
            data.forEach(item => {
                questionButtons += `<button onclick="askPreloadedQuestionFromButton(this)" class="example-chip text-left p-3 rounded-lg">${item}</button>`;
            });
            resultsDiv.innerHTML = questionButtons;

        } catch (error) {
            console.error('Fetch error:', error);
            resultsDiv.innerText = 'Failed to load data.';
        }
    });
</script>
</body>
</html>
